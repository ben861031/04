window.addEventListener('DOMContentLoaded', function(){

    const auditDateInput =
        document.getElementById('auditDate');

    const today =
        auditDateInput && auditDateInput.value
        ? new Date(auditDateInput.value)
        : new Date();

    const yyyy = today.getFullYear();
    const mm = String(today.getMonth()+1).padStart(2,'0');
    const dd = String(today.getDate()).padStart(2,'0');

    const dateInput =
        document.getElementById('auditDate');

    if(dateInput){
        dateInput.value = `${yyyy}-${mm}-${dd}`;
    }

});




function copyTableResult(){

    const table =
        document.querySelector('table');

    if(!table){
        return;
    }

    // 複製表格並強制每格字體
    const clonedTable =
        table.cloneNode(true);

    clonedTable.style.fontFamily =
        "'DFKai-SB','標楷體',serif";

    clonedTable.style.fontSize =
        "12pt";

    clonedTable.style.borderCollapse =
        "collapse";

    clonedTable.style.width = "100%";

    clonedTable.style.tableLayout =
        "fixed";

    clonedTable.style.border =
        "1px solid black";

    clonedTable.querySelectorAll('th,td')
    .forEach(cell=>{

        cell.style.fontFamily =
            "'DFKai-SB','標楷體',serif";

        cell.style.fontSize = "12pt";

        cell.style.border =
            "1px solid black";

        cell.style.padding =
            "8px 6px";

        cell.style.verticalAlign =
            "middle";

        cell.style.wordBreak =
            "break-word";

        // 主旨欄靠左
        const headerRow =
            clonedTable.querySelectorAll('th');

        let subjectIndex = -1;

        headerRow.forEach((th,index)=>{

            if(
                th.innerText.includes('主旨') ||
                th.innerText.includes('案由')
            ){
                subjectIndex = index;
            }

        });

        const row =
            cell.parentElement;

        const cells =
            Array.from(row.children);

        const currentIndex =
            cells.indexOf(cell);

        if(currentIndex === subjectIndex){

            // 表頭維持置中
            if(cell.tagName === 'TD'){
                cell.style.textAlign = "left";
            }else{
                cell.style.textAlign = "center";
            }

        }

        
        // 固定欄寬
        const headerText =
            headerRow[currentIndex]
            ? headerRow[currentIndex].innerText.trim()
            : '';

        if(headerText.includes('表單編號')){
            cell.style.width = '105px';
            cell.style.textAlign = 'center';
        }

        if(
            headerText.includes('主旨') ||
            headerText.includes('案由')
        ){
            cell.style.width = '520px';
        }

        if(headerText.includes('收文日期')){
            cell.style.width = '95px';
            cell.style.textAlign = 'center';
        }

        if(
            headerText.includes('應歸檔日期') ||
            headerText.includes('限辦日期')
        ){
            cell.style.width = '105px';
            cell.style.textAlign = 'center';
        }

        if(headerText.includes('已逾期天數')){
            cell.style.width = '72px';
        }

// 已逾期天數置中
        if(
            cell.innerText &&
            !isNaN(cell.innerText.trim())
        ){
            cell.style.textAlign = "center";
        }

    });

    
    // 複製時移除公文類型欄
    const clonedHeaders =
        clonedTable.querySelectorAll('th');

    const removeIndexes = [];

    clonedHeaders.forEach((th,index)=>{

        const txt = th.innerText.trim();

        if(
            txt === '公文類型' ||
            txt === '系統判斷類型' ||
            txt === '最終類型'
        ){
            removeIndexes.push(index);
        }

    });

    removeIndexes.reverse().forEach(removeIndex=>{

        clonedTable.querySelectorAll('tr')
        .forEach(tr=>{

            const cells =
                tr.querySelectorAll('th,td');

            if(cells[removeIndex]){
                cells[removeIndex].remove();
            }

        });

    });


const titleHtml = `
<div style="width:100%;text-align:center;margin-bottom:12px;">
<div style="font-family:'Microsoft JhengHei',sans-serif;font-size:18pt;font-weight:bold;margin-bottom:2px;">
環興科技股份有限公司
</div>
<div style="font-family:'Microsoft JhengHei',sans-serif;font-size:16pt;font-weight:bold;">
稽催清冊
</div>
</div>`;

    const htmlContent =
        titleHtml + clonedTable.outerHTML;

    const blobHtml =
        new Blob([htmlContent], {
            type:'text/html'
        });

    const blobText =
        new Blob([clonedTable.innerText], {
            type:'text/plain'
        });

    const data = [
        new ClipboardItem({
            'text/html': blobHtml,
            'text/plain': blobText
        })
    ];

    navigator.clipboard.write(data)
    .then(()=>{

        alert('已複製正式表格');

    });

}




function exportWordReport(){

    const table =
        document.querySelector('table');

    if(!table){
        alert('目前沒有資料');
        return;
    }

    const clonedTable =
        table.cloneNode(true);

    const headersToRemove = clonedTable.querySelectorAll('th');
    const removeIndexes = [];

    headersToRemove.forEach((th,index)=>{
        const t = th.innerText.trim();
        if(
            t === '公文類型' ||
            t === '系統判斷類型' ||
            t === '最終類型'
        ){
            removeIndexes.push(index);
        }
    });

    removeIndexes.reverse().forEach(removeIndex=>{
        clonedTable.querySelectorAll('tr').forEach(tr=>{
            const cells = tr.querySelectorAll('th,td');
            if(cells[removeIndex]){
                cells[removeIndex].remove();
            }
        });
    });

    clonedTable.style.borderCollapse = 'collapse';
    clonedTable.style.width = '100%';
    clonedTable.style.fontFamily =
        "'DFKai-SB','標楷體',serif";

    clonedTable.querySelectorAll('th,td')
    .forEach(cell=>{

        cell.style.border =
            '1px solid black';

        cell.style.padding =
            '8px 6px';

        cell.style.fontFamily =
            "'DFKai-SB','標楷體',serif";

        cell.style.fontSize = '12pt';
        cell.style.verticalAlign = 'middle';

        if(cell.tagName === 'TH'){
            cell.style.backgroundColor = '#d9d9d9';
            cell.style.textAlign = 'center';
            cell.style.fontWeight = 'bold';
        }

    });

    const htmlContent = `
    <html>
    <head>
    <meta charset="utf-8">
    <style>
        @page WordSection1 {
            size: 841.9pt 595.3pt;
            margin: 1.0in 1.0in 1.0in 1.0in;
            mso-header-margin: .5in;
            mso-footer-margin: .5in;
            mso-paper-source: 0;
        }
        div.WordSection1 {
            page: WordSection1;
        }
    </style>
    </head>
    <body>
    <div class="WordSection1">

    <div style="text-align:center;margin-bottom:10px;">
        <div style="
            font-family:'Microsoft JhengHei',sans-serif;
            font-size:18pt;
            font-weight:bold;
            margin-bottom:2px;
        ">
            環興科技股份有限公司
        </div>

        <div style="
            font-family:'Microsoft JhengHei',sans-serif;
            font-size:16pt;
            font-weight:bold;
        ">
            稽催清冊
        </div>
    </div>

    ${clonedTable.outerHTML}

    </div>
    </body>
    </html>
    `;

    const blob = new Blob(
        ['\ufeff', htmlContent],
        {
            type:'application/msword'
        }
    );

    const url =
        URL.createObjectURL(blob);

    const a =
        document.createElement('a');

    a.href = url;
    a.download = '稽催清冊.doc';

    document.body.appendChild(a);

    a.click();

    document.body.removeChild(a);

    URL.revokeObjectURL(url);

}

</script>

        <div style="display:flex; flex-direction:column; gap:12px;">
            <button class="button-secondary" onclick="executeCopy(false)" style="width:100%; text-align:center;">複製表格</button>
            <button class="button-primary" onclick="executeCopy(true)" style="width:100%; text-align:center;">複製信件範本</button>
        </div>
        <div style="margin-top:20px; display:flex; justify-content:flex-end;">
            <button class="button-secondary" onclick="closeCopyFormatModal()">取消</button>
        </div>
    </div>
</div>

<div id="contactSettingsModal" class="modal-overlay" style="display:none; position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.5); z-index:10000; align-items:center; justify-content:center;">
    <div class="modal-content" style="background:#fff; border-radius:12px; padding:24px; width:90%; max-width:500px; box-shadow:0 10px 30px rgba(0,0,0,0.2);">
        <h3 style="margin-top:0; margin-bottom:16px; color:var(--navy); font-size:18px;">信件聯絡人設定</h3>
        <p style="font-size:14px; color:var(--muted); margin-bottom:16px;">請設定各部門對應的行政聯絡人姓名，系統複製信件範本時會自動帶入。</p>
        <div id="contactListContainer" style="max-height: 300px; overflow-y: auto; margin-bottom:16px; display:flex; flex-direction:column; gap:8px;">
        </div>
        <div style="display:flex; justify-content:flex-end; gap:12px;">
            <button class="button-secondary" onclick="closeContactSettingsModal()">取消</button>
            <button class="button-primary" onclick="saveContactSettings()">儲存</button>
        </div>
    </div>
</div>

<div id="subjectCopyModal" class="modal-overlay" style="display:none; position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.6); z-index:10000; align-items:center; justify-content:center;">
    <div class="modal-content" style="background:#fff; border-radius:12px; padding:30px; width:90%; max-width:450px; box-shadow:0 10px 30px rgba(0,0,0,0.2);">
        <h3 style="margin-top:0; margin-bottom:20px; color:var(--navy); font-size:22px; text-align:center;">信件複製中心</h3>
        
        <div style="background:#f5f7fa; border:1px solid var(--line); border-radius:8px; padding:16px; margin-bottom:16px;">
            <div style="font-weight:bold; color:var(--navy); font-size:16px; margin-bottom:12px;">📍 第一步：複製信件主旨</div>
            <div id="generatedSubjectText" style="font-weight:bold; color:var(--navy); font-size:15px; word-break:break-all; background:#fff; padding:10px; border:1px dashed var(--muted); border-radius:4px; text-align:center; margin-bottom:12px;"></div>
            <button id="copySubjectBtn" class="button-primary" onclick="copySubjectText()" style="width:100%; text-align:center; padding:12px; font-size:16px; font-weight:bold;">複製主旨</button>
        </div>

        <div style="background:#f5f7fa; border:1px solid var(--line); border-radius:8px; padding:16px; margin-bottom:20px;">
            <div style="font-weight:bold; color:var(--navy); font-size:16px; margin-bottom:12px;">📍 第二步：複製信件內文</div>
            <button id="copyBodyBtn" class="button-secondary" disabled style="width:100%; text-align:center; padding:12px; font-size:16px; font-weight:bold; opacity:0.5; cursor:not-allowed;" onclick="copyBodyText()">請先完成第一步</button>
        </div>
        
        <div style="text-align:center;">
            <button class="button-secondary" onclick="closeSubjectCopyModal()" style="border:none; background:none; color:var(--muted); text-decoration:underline; cursor:pointer;">關閉視窗</button>
        </div>
    </div>
</div>

<script>

let workbookData = null;
let originalData = [];

let currentSort = { key: '', dir: 'asc' };
let departmentContacts = JSON.parse(localStorage.getItem('departmentContacts') || '{}');

function openContactSettingsModal() {
    const container = document.getElementById('contactListContainer');
    container.innerHTML = '';
    
    // Find all unique departments from originalData
    const departments = [...new Set(originalData.map(d => d['部門']))].filter(Boolean).sort();
    
    if (departments.length === 0) {
        container.innerHTML = '<div style="color:var(--muted); text-align:center; padding: 20px;">請先匯入包含部門資料的 Excel。</div>';
    } else {
        departments.forEach(dept => {
            const row = document.createElement('div');
            row.style.display = 'flex';
            row.style.alignItems = 'center';
            row.style.gap = '12px';
            
            const label = document.createElement('div');
            label.style.width = '120px';
            label.style.fontWeight = 'bold';
            label.innerText = dept;
            
            const input = document.createElement('input');
            input.type = 'text';
            input.placeholder = '聯絡人姓名 (例如: 小美)';
            input.value = departmentContacts[dept] || '';
            input.className = 'contact-input';
            input.dataset.dept = dept;
            input.style.flex = '1';
            input.style.padding = '8px';
            input.style.borderRadius = '6px';
            input.style.border = '1px solid var(--line)';
            
            row.appendChild(label);
            row.appendChild(input);
            container.appendChild(row);
        });
    }
    
    document.getElementById('contactSettingsModal').style.display = 'flex';
}

function closeContactSettingsModal() {
    document.getElementById('contactSettingsModal').style.display = 'none';
}

function saveContactSettings() {
    const inputs = document.querySelectorAll('.contact-input');
    inputs.forEach(input => {
        const dept = input.dataset.dept;
        const val = input.value.trim();
        if (val) {
            departmentContacts[dept] = val;
        } else {
            delete departmentContacts[dept];
        }
    });
    localStorage.setItem('departmentContacts', JSON.stringify(departmentContacts));
    closeContactSettingsModal();
    showToast('聯絡人設定已儲存');
}

function handleCopyClick() {
    const sheetName = document.getElementById('sheetSelect').value;
    const isAllDepartments = sheetName === '全部部門' || sheetName === '請先匯入Excel';
    
    if (isAllDepartments) {
        copyTableResult(false);
    } else {
        document.getElementById('copyFormatModal').style.display = 'flex';
    }
}

function closeCopyFormatModal() {
    document.getElementById('copyFormatModal').style.display = 'none';
}

function executeCopy(isTemplate) {
    closeCopyFormatModal();
    if (isTemplate) {
        showSubjectCopyModal();
    } else {
        copyTableResult(false);
    }
}

function closeSubjectCopyModal() {
    document.getElementById('subjectCopyModal').style.display = 'none';
    
    const sBtn = document.getElementById('copySubjectBtn');
    sBtn.innerText = '複製主旨';
    sBtn.classList.remove('btn-excel');
    sBtn.classList.add('button-primary');
    
    const bBtn = document.getElementById('copyBodyBtn');
    bBtn.innerText = '請先完成第一步';
    bBtn.disabled = true;
    bBtn.style.opacity = '0.5';
    bBtn.style.cursor = 'not-allowed';
    bBtn.classList.remove('button-primary', 'btn-excel');
    bBtn.classList.add('button-secondary');
}

function showSubjectCopyModal() {
    const sheetName = document.getElementById('sheetSelect').value;
    const now = new Date();
    const yyyy = now.getFullYear();
    const mm = String(now.getMonth() + 1).padStart(2, '0');
    const dd = String(now.getDate()).padStart(2, '0');
    const subject = `【${sheetName}】公文稽催通知 (${yyyy}/${mm}/${dd})`;
    
    document.getElementById('generatedSubjectText').innerText = subject;
    document.getElementById('subjectCopyModal').style.display = 'flex';
}

function copySubjectText() {
    const subject = document.getElementById('generatedSubjectText').innerText;
    navigator.clipboard.writeText(subject).then(() => {
        const sBtn = document.getElementById('copySubjectBtn');
        sBtn.innerText = '✅ 主旨已複製';
        sBtn.classList.remove('button-primary');
        sBtn.classList.add('btn-excel');
        
        const bBtn = document.getElementById('copyBodyBtn');
        bBtn.innerText = '複製內文';
        bBtn.disabled = false;
        bBtn.style.opacity = '1';
        bBtn.style.cursor = 'pointer';
        bBtn.classList.remove('button-secondary');
        bBtn.classList.add('button-primary');
    }).catch(err => {
        showToast('複製主旨失敗');
    });
}

function copyBodyText() {
    copyTableResult(true);
    const bBtn = document.getElementById('copyBodyBtn');
    bBtn.innerText = '✅ 內文已複製';
    bBtn.classList.remove('button-primary');
    bBtn.classList.add('btn-excel');
    setTimeout(() => {
        closeSubjectCopyModal();
    }, 1500);
}


function showToast(message) {
    let container = document.getElementById('toastContainer');
    if (!container) {
        container = document.createElement('div');
        container.id = 'toastContainer';
        document.body.appendChild(container);
    }
    const toast = document.createElement('div');
    toast.className = 'toast';
    toast.innerText = message;
    container.appendChild(toast);
    setTimeout(() => {
        toast.style.opacity = '0';
        setTimeout(() => toast.remove(), 300);
    }, 3000);
}

function clearData() {
    if (!confirm('確定要清除所有匯入的資料嗎？\n（此動作將清空畫面上與暫存的資料，且無法復原）')) return;
    workbookData = null;
    originalData = [];
    document.getElementById('sheetSelect').innerHTML = '<option>請先匯入Excel</option>';
    document.getElementById('currentSheet').innerText = '尚未匯入';
    document.getElementById('excelFile').value = '';
    document.getElementById('lastFileInfo').innerHTML = '尚未匯入';
    renderTable([]);
    localStorage.removeItem('savedExcelData');
    localStorage.removeItem('savedSmartImportData');
    localStorage.removeItem('currentSheet');
    localStorage.removeItem('lastFileName');
    localStorage.removeItem('lastFileTime');
    showToast('資料已清除');
}

function handleSort(key) {
    if (currentSort.key === key) {
        currentSort.dir = currentSort.dir === 'asc' ? 'desc' : 'asc';
    } else {
        currentSort.key = key;
        currentSort.dir = 'desc'; 
    }
    filterTable(); 
}

function updateDocType(docNo, newType){
 const row=originalData.find(item=>item['總收發文號']==docNo);
 if(!row) return;
 
 if(!confirm(`您確定要將案件 ${docNo} 切換成「${newType}」嗎？`)){
     filterTable(); // 還原畫面上 select 的選項
     return;
 }

 row['最終類型'] = newType;
 manualTypeMap[docNo] = newType;
 localStorage.setItem('manualTypeMap', JSON.stringify(manualTypeMap));
 filterTable();
 showToast('類型已更新為 ' + newType);
}

function processFile(file) {
    if (workbookData && workbookData.SheetNames && workbookData.SheetNames.length > 0) {
        if (!confirm('目前系統內已有資料。匯入新檔案將會完全覆蓋現有資料，確定要繼續嗎？')) {
            const fileInput = document.getElementById('fileInput');
            if(fileInput) fileInput.value = '';
            return;
        }
    }
    const reader = new FileReader();
    reader.onload = function(evt){
        const data = new Uint8Array(evt.target.result);
        
        let binaryString = '';
        for (let i = 0; i < data.byteLength; i++) {
            binaryString += String.fromCharCode(data[i]);
        }
        try {
            localStorage.setItem('savedExcelData', btoa(binaryString));
            
            const now = new Date();
            const timeStr = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
            localStorage.setItem('lastFileName', file.name);
            localStorage.setItem('lastFileTime', timeStr);
            
            updateLastFileInfo(file.name, timeStr);
        } catch(e) {
            console.warn('File too large to save', e);
        }

        workbookData = XLSX.read(data,{
            type:'array',
            cellDates:true
        });
        loadSheetList();
        showToast('檔案匯入成功');
    };
    reader.readAsArrayBuffer(file);
}

document.addEventListener('DOMContentLoaded',()=>{
    document.body.addEventListener('dragover', (e) => {
        e.preventDefault();
        document.body.classList.add('drag-over');
    });
    document.body.addEventListener('dragleave', (e) => {
        e.preventDefault();
        if (e.relatedTarget === null) {
            document.body.classList.remove('drag-over');
        }
    });
    document.body.addEventListener('drop', (e) => {
        e.preventDefault();
        document.body.classList.remove('drag-over');
        if (e.dataTransfer.files && e.dataTransfer.files.length > 0) {
            const file = e.dataTransfer.files[0];
            if (file.name.endsWith('.xls') || file.name.endsWith('.xlsx')) {
                document.getElementById('excelFile').files = e.dataTransfer.files;
                processFile(file);
            } else {
                showToast('請上傳 Excel 檔案 (.xlsx, .xls)');
            }
        }
    });

    const savedData = localStorage.getItem('savedExcelData');
    const savedSmartData = localStorage.getItem('savedSmartImportData');
    let isReadSuccess = false;
    
    if (savedSmartData) {
        try {
            workbookData = JSON.parse(savedSmartData);
            isReadSuccess = true;
        } catch (e) {
            console.error('Failed to parse smart import data', e);
            localStorage.removeItem('savedSmartImportData');
            localStorage.removeItem('lastFileName');
            localStorage.removeItem('lastFileTime');
        }
    } else if (savedData) {
        try {
            const binaryString = atob(savedData);
            const bytes = new Uint8Array(binaryString.length);
            for (let i = 0; i < binaryString.length; i++) {
                bytes[i] = binaryString.charCodeAt(i);
            }
            workbookData = XLSX.read(bytes, { type: 'array', cellDates: true });
            isReadSuccess = true;
        } catch (e) {
            console.error('Failed to parse saved data', e);
            localStorage.removeItem('savedExcelData');
            localStorage.removeItem('lastFileName');
            localStorage.removeItem('lastFileTime');
        }
    }

    if (isReadSuccess) {
        try {
            const savedSheet = localStorage.getItem('currentSheet');
            loadSheetList(savedSheet);
            
            const lastFileName = localStorage.getItem('lastFileName');
            const lastFileTime = localStorage.getItem('lastFileTime');
            if(lastFileName) {
                updateLastFileInfo(lastFileName, lastFileTime);
            }
            
            showToast('已還原上次的資料');
        } catch (e) {
            console.error('Failed to render saved data', e);
        }
    }
});

function updateLastFileInfo(name, time) {
    const el = document.getElementById('lastFileInfo');
    if(el) {
        el.innerHTML = `<span style="font-size:14px;font-weight:700;color:#fff;">${name}</span><br>${time}`;
    }
}

let manualTypeMap = JSON.parse(localStorage.getItem('manualTypeMap') || '{}');
let DOC_TYPE_THRESHOLD = parseInt(localStorage.getItem('docTypeThreshold')) || 7;

document.getElementById('excelFile')
.addEventListener('change',handleFile);

document.getElementById('sheetSelect')
.addEventListener('change',loadSelectedSheet);

document.getElementById('searchInput')
.addEventListener('input',filterTable);


document.getElementById('auditDate')
.addEventListener('change',()=>{

    if(originalData.length > 0){
        recalculateOverdueDays();
    }

});


document.getElementById('docTypeFilter')
.addEventListener('change',filterTable);

function handleFile(e){
    const file = e.target.files[0];
    if(file) processFile(file);
}

function loadSheetList(initialSheet = null){
    const select = document.getElementById('sheetSelect');
    select.innerHTML = '';

    const allOption = document.createElement('option');
    allOption.value = '全部部門';
    allOption.textContent = '全部部門';
    select.appendChild(allOption);

    workbookData.SheetNames.forEach(name=>{
        const option = document.createElement('option');
        option.value = name;
        option.textContent = name;
        select.appendChild(option);
    });

    if (initialSheet && Array.from(select.options).some(o => o.value === initialSheet)) {
        select.value = initialSheet;
    }

    loadSelectedSheet();
}

function loadSelectedSheet(){
    const sheetName = document.getElementById('sheetSelect').value;
    document.getElementById('currentSheet').innerText = sheetName;
    localStorage.setItem('currentSheet', sheetName);

    let allData = [];

    const sheetsToProcess = sheetName === '全部部門' 
        ? workbookData.SheetNames 
        : [sheetName];

    sheetsToProcess.forEach(name => {
        const ws = workbookData.Sheets[name];
        const rows = XLSX.utils.sheet_to_json(ws,{ header:1, defval:'' });
        
        let headerRowIndex = 0;
        rows.forEach((row,index)=>{
            const text = row.join('|');
            if(text.includes('總收發文號') || text.includes('收文日期') || text.includes('應歸檔日期')){
                headerRowIndex = index;
            }
        });

        const headers = rows[headerRowIndex];
        if(!headers) return;

        const dataRows = rows.slice(headerRowIndex + 1);
        const data = dataRows.map(r=>{
            let obj = {};
            headers.forEach((h,i)=>{
                if(h){
                    obj[h] = r[i];
                }
            });
            // 補上部門資訊（如果原本沒有）
            if (!obj['部門'] && !obj['單位'] && !obj['承辦單位'] && !obj['承辦部門']) {
                obj['部門'] = name;
            }
            return obj;
        });

        allData = allData.concat(data);
    });

    processData(allData);

    // 預設只顯示收文
    document.getElementById('docTypeFilter').value = '收文';
    filterTable();
}

function processData(data){

    const auditDateInput =
        document.getElementById('auditDate');

    const today =
        auditDateInput && auditDateInput.value
        ? new Date(auditDateInput.value)
        : new Date();

originalData = data.map(item=>{

        let overdueDays = 0;

        const dueDateValue =
            item['應歸檔日期'] ||
            item['限辦日期'] ||
            item['歸檔日期'];

        if(dueDateValue){

            const dueDate =
                new Date(dueDateValue);

            if(!isNaN(dueDate)){

                const diffDays =
                    Math.floor(
                        (today - dueDate)
                        / (1000*60*60*24)
                    );

                if(diffDays > 0){

                    overdueDays = diffDays;

                }
            }
        }

        // 判斷公文類型
        let docType = '';

        const receiveDate =
            item['收文日期']
            ? new Date(item['收文日期'])
            : null;

        if(
            receiveDate &&
            dueDateValue &&
            !isNaN(receiveDate)
        ){

            const dueDate =
                new Date(dueDateValue);

            if(!isNaN(dueDate)){

                const processDays =
                    Math.floor(
                        (dueDate - receiveDate)
                        / (1000*60*60*24)
                    );

                docType =
                    processDays >= DOC_TYPE_THRESHOLD
                    ? '收文'
                    : '發文';
            }
        }

        const docNo = item['總收發文號'];

        return {
            ...item,
            '系統判斷類型': docType,
            '最終類型': manualTypeMap[docNo] || docType,
            '已逾期天數': overdueDays
        };

    });

    renderTable(originalData);
}


function recalculateOverdueDays(){

    const auditDateInput =
        document.getElementById('auditDate');

    const auditDate =
        auditDateInput && auditDateInput.value
        ? new Date(auditDateInput.value)
        : new Date();

    originalData.forEach(item=>{

        const dueDateValue =
            item['應歸檔日期'] ||
            item['限辦日期'] ||
            item['歸檔日期'];

        let overdueDays = 0;

        if(dueDateValue){

            const dueDate =
                new Date(dueDateValue);

            if(!isNaN(dueDate)){

                const diffDays =
                    Math.floor(
                        (auditDate - dueDate)
                        / (1000*60*60*24)
                    );

                if(diffDays > 0){
                    overdueDays = diffDays;
                }

            }

        }

        item['已逾期天數'] = overdueDays;

    });

    filterTable();

}


function renderTable(data){

    const head =
        document.getElementById('tableHead');

    const body =
        document.getElementById('tableBody');

    head.innerHTML = '';
    body.innerHTML = '';

    if(data.length === 0){
        const emptyRow = document.createElement('tr');
        emptyRow.className = 'empty-state';
        emptyRow.innerHTML = '<td colspan="100">目前沒有符合條件的案件</td>';
        body.appendChild(emptyRow);
        return;
    }

    const headers =
        Object.keys(data[0])
        ;

    headers.forEach(h=>{
        const th = document.createElement('th');
        th.innerText = (h === '總收發文號') ? '表單編號' : h;
        th.className = 'sortable';
        if (currentSort.key === h) {
            th.classList.add(currentSort.dir === 'asc' ? 'sort-asc' : 'sort-desc');
        }
        th.onclick = () => handleSort(h);
        head.appendChild(th);
    });

    let overdueCount = 0;

    data.forEach(row=>{

        const tr =
            document.createElement('tr');

        if(row['已逾期天數'] > 0){

            tr.classList.add('overdue');
            overdueCount++;

        }

        headers.forEach(h=>{

            const td =
                document.createElement('td');

            if(h==='最終類型'){
                const docNo = row['總收發文號'] ?? '';
                const isR = row[h] === '收文' ? 'selected' : '';
                const isS = row[h] === '發文' ? 'selected' : '';
                const typeClass = row[h] === '收文' ? 'type-receive' : (row[h] === '發文' ? 'type-send' : '');
                td.innerHTML = `<select class="type-select ${typeClass}" onchange="updateDocType('${docNo}', this.value)">
                                  <option value="收文" ${isR}>收文</option>
                                  <option value="發文" ${isS}>發文</option>
                                </select>`;
            }else{
                const val = row[h] ?? '';
                if ((h.includes('主旨') || h.includes('案由')) && typeof val === 'string' && val.includes('<a') && val.includes('</a>')) {
                    const template = document.createElement('template');
                    template.innerHTML = val;
                    td.textContent = '';
                    Array.from(template.content.childNodes).forEach(node => {
                        if (node.nodeType === Node.TEXT_NODE) {
                            td.appendChild(document.createTextNode(node.textContent));
                        } else if (node.nodeType === Node.ELEMENT_NODE && node.tagName.toLowerCase() === 'a') {
                            const a = document.createElement('a');
                            const href = node.getAttribute('href') || '';
                            if (href.startsWith('http://') || href.startsWith('https://')) {
                                a.href = href;
                            } else {
                                a.href = '#';
                            }
                            a.textContent = node.textContent;
                            if(node.hasAttribute('target')) a.target = node.getAttribute('target');
                            td.appendChild(a);
                        } else {
                            td.appendChild(document.createTextNode(node.textContent));
                        }
                    });
                } else {
                    td.innerText = val;
                }
            }

            // 主旨靠左
            if(
                h.includes('主旨') ||
                h.includes('案由')
            ){
                td.classList.add('subject-cell');
            }

            tr.appendChild(td);

        });

        body.appendChild(tr);

    });

    // 收發文統計
    const receiveCount =
        originalData.filter(item=>
            item['最終類型'] === '收文'
        ).length;

    const sendCount =
        originalData.filter(item=>
            item['最終類型'] === '發文'
        ).length;

    document.getElementById('totalCount')
    .innerText = receiveCount;

    document.getElementById('overdueCount')
    .innerText = sendCount;
}

function filterTable(){

    const keyword =
        document.getElementById('searchInput')
        .value.toLowerCase();

    const typeFilter =
        document.getElementById('docTypeFilter')
        .value;

    let filtered =
        originalData.filter(item=>{

        const matchKeyword =
            Object.values(item)
            .some(v=>String(v)
            .toLowerCase()
            .includes(keyword));

        const matchType =
            !typeFilter ||
            item['最終類型'] === typeFilter;

        return matchKeyword && matchType;

    });

    if (currentSort.key) {
        filtered.sort((a, b) => {
            let valA = a[currentSort.key] ?? '';
            let valB = b[currentSort.key] ?? '';
            
            if (valA === valB) return 0;
            
            let numA = Number(valA);
            let numB = Number(valB);
            if (!isNaN(numA) && !isNaN(numB) && valA !== '' && valB !== '') {
                return currentSort.dir === 'asc' ? numA - numB : numB - numA;
            }
            
            let dateA = Date.parse(valA);
            let dateB = Date.parse(valB);
            if (!isNaN(dateA) && !isNaN(dateB)) {
                return currentSort.dir === 'asc' ? dateA - dateB : dateB - dateA;
            }
            
            valA = String(valA);
            valB = String(valB);
            if (valA < valB) return currentSort.dir === 'asc' ? -1 : 1;
            if (valA > valB) return currentSort.dir === 'asc' ? 1 : -1;
            return 0;
        });
    }

    renderTable(filtered);
}

window.addEventListener('DOMContentLoaded',()=>{

    const thresholdInput = document.getElementById('thresholdInput');
    if(!thresholdInput) return;

    thresholdInput.value = DOC_TYPE_THRESHOLD;

    function saveThreshold(){
        const value = parseInt(thresholdInput.value);

        if(isNaN(value) || value <= 0){
            showToast('請輸入正確天數');
            thresholdInput.value = DOC_TYPE_THRESHOLD;
            return;
        }

        DOC_TYPE_THRESHOLD = value;
        localStorage.setItem('docTypeThreshold', value);

        if(originalData.length){
            loadSelectedSheet();
        }
    }

    thresholdInput.addEventListener('change', saveThreshold);

    thresholdInput.addEventListener('keydown', function(e){
        if(e.key === 'Enter'){
            saveThreshold();
        }
    });
});


function exportExcel(){

    const sheetName =
        document.getElementById('sheetSelect').value;
    const isAllDepartments = sheetName === '全部部門' || sheetName === '請先匯入Excel';

    const exportData = originalData.map(row=>{

        const {
            '部門': existingDepartment,
            ...rest
        } = row;
        
        let cleanedRest = {...rest};
        
        Object.keys(cleanedRest).forEach(k => {
            if ((k.includes('主旨') || k.includes('案由')) && typeof cleanedRest[k] === 'string' && cleanedRest[k].includes('<a')) {
                const tempDiv = document.createElement('div');
                tempDiv.innerHTML = cleanedRest[k];
                cleanedRest[k] = tempDiv.innerText || tempDiv.textContent;
            }
        });

        if (!isAllDepartments) {
            return cleanedRest;
        }

        return {
            '部門':
                existingDepartment ||
                row['單位'] ||
                row['承辦單位'] ||
                sheetName,
            ...cleanedRest
        };

    });

    const worksheet =
        XLSX.utils.json_to_sheet(exportData);

    const workbook =
        XLSX.utils.book_new();

    XLSX.utils.book_append_sheet(
        workbook,
        worksheet,
        '公文稽催'
    );

    XLSX.writeFile(
        workbook,
        '公文稽催平台.xlsx'
    );
}

let pendingSmartImport = null;

function openSmartImportModal() {
    pendingSmartImport = null;
    const pasteZone = document.getElementById('smartImportPasteZone');
    pasteZone.innerHTML = '';
    document.getElementById('smartImportModal').style.display = 'flex';
    setTimeout(() => pasteZone.focus(), 100);
}

function closeSmartImportModal() {
    document.getElementById('smartImportModal').style.display = 'none';
}

function confirmSmartImport() {
    try {
        if (!pendingSmartImport) {
            showToast('請先貼上資料');
            return;
        }
        if (workbookData && workbookData.SheetNames && workbookData.SheetNames.length > 0) {
            if (!confirm('目前系統內已有資料。智慧匯入將會完全覆蓋現有資料，確定要繼續嗎？')) {
                return;
            }
        }
        handleSmartImport(pendingSmartImport.html, pendingSmartImport.text);
    } catch(err) {
        console.error('Smart import error:', err);
    } finally {
        closeSmartImportModal();
        pendingSmartImport = null;
    }
}

document.getElementById('smartImportPasteZone').addEventListener('paste', (e) => {
    e.preventDefault();
    const html = e.clipboardData.getData('text/html');
    const text = e.clipboardData.getData('text/plain');

    if (html || text) {
        pendingSmartImport = { html, text };
        document.getElementById('smartImportPasteZone').innerHTML = '<div style="color:var(--teal); font-weight:bold; text-align:center; padding: 40px 0; font-size:16px;">✅ 資料已讀取，正在自動匯入...</div>';
        setTimeout(() => {
            confirmSmartImport();
        }, 300);
    }
});

function handleSmartImport(html, text) {
    const linkMap = {};
    if (html) {
        const div = document.createElement('div');
        div.innerHTML = html;
        const links = div.querySelectorAll('a');
        links.forEach(a => {
            const aText = a.innerText.trim();
            if (aText) {
                a.setAttribute('target', '_blank');
                a.setAttribute('style', 'color: inherit; text-decoration: underline;');
                linkMap[aText] = a.outerHTML;
            }
        });
    }

    const lines = text.split(/\r?\n/).map(l => l.trim()).filter(l => l !== '');
    if (lines.length === 0) return;

    let headers = [];
    let parsedData = [];
    let headerIndex = -1;

    for (let i = 0; i < lines.length; i++) {
        if (lines[i].includes('總收發文號') && lines[i].includes('主旨')) {
            headers = lines[i].split('\t').map(h => {
                let text = h.trim();
                if (text === '承辦部門' || text === '承辦單位' || text === '單位') {
                    return '部門';
                }
                return text;
            });
            headerIndex = i;
            break;
        }
    }

    if (headerIndex === -1) {
        showToast('找不到表頭 (需包含總收發文號、主旨等)');
        return;
    }

    let i = headerIndex + 1;
    while (i < lines.length) {
        let parts = lines[i].split('\t');
        
        if (i + 1 < lines.length) {
            let nextParts = lines[i+1].split('\t');
            if (parts.length + nextParts.length === headers.length) {
                parts = parts.concat(nextParts);
                i++; 
            }
        }
        
        let tempRowData = {};
        headers.forEach((header, idx) => {
            let val = (parts[idx] || '').trim();
            if (linkMap[val] && (header.includes('主旨') || header.includes('案由'))) {
                tempRowData[header] = linkMap[val];
            } else {
                tempRowData[header] = val;
            }
        });

        if (!tempRowData['部門']) {
            tempRowData['部門'] = '智慧匯入';
        }
        
        let rowData = {};
        const standardOrder = ['總收發文號', '收文日期', '主旨', '應歸檔日期', '部門'];
        standardOrder.forEach(k => {
            if (tempRowData[k] !== undefined) {
                rowData[k] = tempRowData[k];
            }
        });
        Object.keys(tempRowData).forEach(k => {
            if (!standardOrder.includes(k)) {
                rowData[k] = tempRowData[k];
            }
        });
        
        if (Object.values(rowData).some(v => v !== '' && v !== '智慧匯入')) {
            parsedData.push(rowData);
        }
        
        i++;
    }

    if (parsedData.length > 0) {
        const departments = [...new Set(parsedData.map(d => d['部門']))];
        const newWorkbook = { SheetNames: [], Sheets: {} };
        
        departments.forEach(dept => {
            newWorkbook.SheetNames.push(dept);
            const deptData = parsedData.filter(d => d['部門'] === dept);
            newWorkbook.Sheets[dept] = XLSX.utils.json_to_sheet(deptData);
        });

        workbookData = newWorkbook;
        
        try {
            localStorage.setItem('savedSmartImportData', JSON.stringify(workbookData));
            localStorage.removeItem('savedExcelData');
        } catch(e) {
            console.error('Failed to save smart import data', e);
            showToast('警告：資料過大，可能無法跨次保留');
        }
        const now = new Date();
        const timeStr = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
        localStorage.setItem('lastFileName', '從剪貼簿智慧匯入');
        localStorage.setItem('lastFileTime', timeStr);
        
        loadSheetList();
        
        const lastFileName = localStorage.getItem('lastFileName') || '從剪貼簿智慧匯入';
        const lastFileTime = localStorage.getItem('lastFileTime') || new Date().toLocaleString();
        updateLastFileInfo(lastFileName, lastFileTime);
        showToast(`成功智慧匯入 ${parsedData.length} 筆資料`);
    } else {
        showToast('無法解析剪貼簿中的資料');
    }
}
